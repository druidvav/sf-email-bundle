# =============================================================================
# DvEmailBundle — пример config/packages/*.yaml
# =============================================================================
#
# message  — профили писем: где лежат Twig-шаблоны, от кого письмо, домен для Message-ID.
#            Несколько ключей (default, user, …) → несколько сервисов dv_email.<alias>.message
#            и выбор через dv_email.locator->get('user').
#
# sender   — кто шлёт через Symfony Mailer: на каждый алиас — свой MailerInterface.
#            Обычно хватает одного default → $message->send() или send('default').
#            Второй SMTP / failover — в MAILER_DSN (failover(...)), не дублируйте здесь без нужды.
#
# locale   — опционально: для писем с setLocale() подставить host/scheme под этот язык (ссылки в Twig).
#
# =============================================================================

dv_email:
    message:
        # Путь @App/Email — замените на ваш бандл/namespace Twig (напр. @AcmeBundle/Email).
        default:
            domain: "%router.request_context.host%"
            template_path: "@App/Email"
            css_file: "%kernel.project_dir%/public/css/email.css"
            from: "%mailer_from%"
            reply_to: "%mailer_replyto%"

        # Второй профиль message — другие шаблоны; в коде: locator->get('user') или отдельный сервис.
        user:
            domain: "%router.request_context.host%"
            template_path: "@App/Email/User"
            css_file: "%kernel.project_dir%/public/css/email.css"
            from: "%mailer_from%"
            reply_to: "%mailer_replyto%"

#        embed_images:
#            url: "https://example.com/img/"
#            path: "%kernel.project_dir%/public/img/"

    sender:
        # Сервис symfony/mailer (id по умолчанию после framework.mailer)
        default:
            mailer: mailer

        # Раскомментируйте, если в приложении объявлен второй MailerInterface, например:
        # services.yaml → mailer.marketing: '@mailer' с другим transport / DSN
        # marketing:
        #     mailer: mailer.marketing

    locale:
        ru: { locale: 'ru', scheme: 'https', host: 'example.ru', httpPort: 80, httpsPort: 443 }
        en: { locale: 'en', scheme: 'https', host: 'example.com', httpPort: 80, httpsPort: 443 }
